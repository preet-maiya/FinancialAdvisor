services:
  financeadvisor:
    image: ghcr.io/preet-maiya/financialadvisor:latest
    container_name: financeadvisor
    env_file: .env
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data                                    # SQLite + DB persistence
      - ./finance_advisor.log:/app/finance_advisor.log      # Log file
      - ./.monarch_session.json:/app/.monarch_session.json  # Auth session (bind mount)
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      - fa-net

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml
    networks:
      - fa-net
    restart: unless-stopped

  mcp-searxng:
    image: node:20-alpine
    container_name: mcp-searxng
    entrypoint: ["npx", "-y", "mcp-searxng"]
    environment:
      - SEARXNG_URL=http://searxng:8080
      - MCP_HTTP_PORT=3000
    networks:
      - fa-net
    restart: unless-stopped
    depends_on:
      - searxng

  llama-gemma4:
    profiles: [gemma4]
    image: ghcr.io/ggml-org/llama.cpp:server
    hostname: llama
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
      - ./webui-config.json:/webui-config.json
    networks:
      - fa-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --model /models/${LLAMA_MODEL_FILE:-gemma-4-it-Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 16384
      --batch-size 512
      --ubatch-size 512
      --threads 8
      --threads-batch 8
      --n-predict -1
      --jinja
      --repeat-penalty 1.1
      --webui-mcp-proxy
      --webui-config-file /webui-config.json

  llama-qwen3:
    profiles: [qwen3]
    image: ghcr.io/ggml-org/llama.cpp:server
    hostname: llama
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
      - ./webui-config.json:/webui-config.json
    networks:
      - fa-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --model /models/${LLAMA_MODEL_FILE:-Qwen3-8B-Q8_0.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 16384
      --batch-size 512
      --ubatch-size 512
      --threads 8
      --threads-batch 8
      --n-predict -1
      --jinja
      --chat-template chatml
      --reverse-prompt "<|im_end|>"
      --webui-mcp-proxy
      --webui-config-file /webui-config.json

networks:
  fa-net:
    driver: bridge
