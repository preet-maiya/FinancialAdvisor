services:
  financeadvisor:
    build: .
    container_name: financeadvisor
    env_file: .env
    volumes:
      - ./data:/app/data                                    # SQLite + DB persistence
      - ./finance_advisor.log:/app/finance_advisor.log      # Log file
      - ./.monarch_session.json:/app/.monarch_session.json  # Auth session (bind mount)
    restart: unless-stopped
    depends_on:
      llama-cpp:
        condition: service_healthy
        required: false   # App still starts if llama profile isn't active
    networks:
      - fa-net

  # Optional: run llama.cpp server inside Docker.
  # Activate with: make up-with-llama  (uses --profile llama)
  # Requires: place your GGUF model at ./models/<name>.gguf
  # and set LLAMA_MODEL_FILE=<name>.gguf in .env
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp
    profiles: [llama]
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - LLAMA_ARG_MODEL=/models/${LLAMA_MODEL_FILE:-model.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_CTX_SIZE=4096
      - LLAMA_ARG_N_PARALLEL=1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - fa-net

networks:
  fa-net:
    driver: bridge
