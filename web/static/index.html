<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinancialAdvisor — Job Manager</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 220px; background: #1a1d27; border-right: 1px solid #2d3148; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar h1 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #7c83a0; padding: 20px 16px 12px; border-bottom: 1px solid #2d3148; }
  #job-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .job-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: background .15s; font-size: 14px; }
  .job-item:hover { background: #22253a; }
  .job-item.active { background: #22253a; border-left-color: #6366f1; color: #a5b4fc; }
  .job-next { font-size: 11px; color: #5a6080; margin-top: 2px; }

  /* Main panel */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #header { padding: 20px 28px 0; border-bottom: 1px solid #2d3148; }
  #header h2 { font-size: 20px; font-weight: 600; }
  #header .next { font-size: 12px; color: #7c83a0; margin-top: 4px; margin-bottom: 12px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-top: 12px; }
  .tab { padding: 8px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: #7c83a0; transition: color .15s, border-color .15s; }
  .tab.active { color: #a5b4fc; border-bottom-color: #6366f1; }
  .tab:hover:not(.active) { color: #c4c9e0; }

  /* Content */
  #content { flex: 1; overflow-y: auto; padding: 28px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Form */
  .form-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: #7c83a0; margin-bottom: 5px; }
  .field input { width: 100%; background: #1a1d27; border: 1px solid #2d3148; border-radius: 6px; color: #e2e8f0; padding: 8px 10px; font-size: 14px; outline: none; transition: border-color .15s; }
  .field input:focus { border-color: #6366f1; }
  .hint { font-size: 12px; color: #5a6080; margin-bottom: 20px; }

  textarea { width: 100%; background: #1a1d27; border: 1px solid #2d3148; border-radius: 6px; color: #e2e8f0; padding: 12px; font-size: 13px; font-family: "SF Mono", "Fira Code", monospace; line-height: 1.6; resize: vertical; min-height: 320px; outline: none; transition: border-color .15s; }
  textarea:focus { border-color: #6366f1; }

  .prompt-hint { font-size: 12px; color: #f59e0b; background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); border-radius: 6px; padding: 8px 12px; margin-bottom: 14px; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button { padding: 8px 18px; border-radius: 6px; border: none; font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity .15s; }
  button:hover { opacity: .85; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-secondary { background: #2d3148; color: #c4c9e0; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-run { background: #059669; color: #fff; }
  button:disabled { opacity: .45; cursor: not-allowed; }

  /* Running job indicator */
  .job-item .run-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #10b981; margin-left: 6px; vertical-align: middle; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .job-item .run-elapsed { font-size: 10px; color: #10b981; margin-top: 2px; }
  .badge-running { background: rgba(16,185,129,.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,.4); border-radius: 20px; font-size: 11px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; animation: pulse 1.4s ease-in-out infinite; }

  /* Sidebar nav links (Chat, Runs) */
  .nav-link { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; font-size: 14px; color: #7c83a0; border-top: 1px solid #2d3148; transition: background .15s; }
  .nav-link:hover { background: #22253a; color: #c4c9e0; }
  .nav-link.active { background: #22253a; border-left-color: #6366f1; color: #a5b4fc; }

  /* Job Runs view */
  #runs-view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  #runs-view.active { display: flex; }
  #runs-header { padding: 20px 28px 16px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 16px; }
  #runs-header h2 { font-size: 20px; font-weight: 600; flex: 1; }
  #runs-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .runs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .runs-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: #7c83a0; padding: 0 12px 10px; border-bottom: 1px solid #2d3148; }
  .runs-table td { padding: 10px 12px; border-bottom: 1px solid #1e2135; vertical-align: top; }
  .runs-table tr:last-child td { border-bottom: none; }
  .runs-table tr:hover td { background: #181b28; }
  .status-success { color: #6ee7b7; font-weight: 500; }
  .status-error { color: #fca5a5; font-weight: 500; }
  .status-running { color: #fcd34d; font-weight: 500; animation: pulse 1.4s ease-in-out infinite; }
  .error-cell { color: #f87171; font-size: 12px; max-width: 320px; word-break: break-word; }
  .runs-empty { color: #5a6080; font-size: 14px; padding: 40px 0; text-align: center; }
  .trace-toggle { font-size: 11px; color: #6366f1; cursor: pointer; white-space: nowrap; }
  .trace-toggle:hover { color: #a5b4fc; }
  .trace-row td { padding: 0 12px 10px 28px; }
  .trace-pre { background: #0d0f18; border: 1px solid #2d3148; border-radius: 6px; padding: 12px; font-size: 11px; font-family: "SF Mono", "Fira Code", monospace; color: #f87171; white-space: pre-wrap; word-break: break-all; margin: 0; max-height: 300px; overflow-y: auto; }

  /* Chat view */
  #chat-view { display: none; flex: 1; overflow: hidden; }
  #chat-view.active { display: flex; }

  /* Session list panel */
  #session-panel { width: 200px; background: #13151f; border-right: 1px solid #2d3148; display: flex; flex-direction: column; flex-shrink: 0; }
  #session-panel-header { padding: 14px 12px 10px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 8px; }
  #session-panel-header span { font-size: 12px; font-weight: 600; color: #7c83a0; text-transform: uppercase; letter-spacing: .07em; flex: 1; }
  #new-chat-btn { font-size: 18px; background: none; border: none; color: #6366f1; cursor: pointer; padding: 0 2px; line-height: 1; }
  #new-chat-btn:hover { color: #a5b4fc; opacity: 1; }
  #session-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .session-item { padding: 9px 12px; cursor: pointer; border-left: 3px solid transparent; font-size: 12px; color: #9ca3b8; transition: background .15s; display: flex; align-items: flex-start; gap: 6px; }
  .session-item:hover { background: #1a1d27; }
  .session-item.active { background: #1a1d27; border-left-color: #6366f1; color: #c4c9e0; }
  .session-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-date { font-size: 10px; color: #5a6080; margin-top: 2px; }
  .session-del { opacity: 0; font-size: 13px; color: #5a6080; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .session-item:hover .session-del { opacity: 1; }
  .session-del:hover { color: #f87171; }

  /* Conversation panel */
  #convo-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #chat-header { padding: 16px 24px 14px; border-bottom: 1px solid #2d3148; }
  #chat-header h2 { font-size: 18px; font-weight: 600; }
  #chat-header p { font-size: 12px; color: #7c83a0; margin-top: 3px; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .chat-msg { display: flex; flex-direction: column; max-width: 82%; }
  .chat-msg.user { align-self: flex-end; align-items: flex-end; }
  .chat-msg.assistant { align-self: flex-start; align-items: flex-start; }
  .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .chat-msg.user .chat-bubble { background: #6366f1; color: #fff; border-bottom-right-radius: 3px; }
  .chat-msg.assistant .chat-bubble { background: #1a1d27; border: 1px solid #2d3148; color: #e2e8f0; border-bottom-left-radius: 3px; }
  .chat-label { font-size: 11px; color: #5a6080; margin-bottom: 4px; }
  #chat-input-row { display: flex; gap: 10px; padding: 14px 24px; border-top: 1px solid #2d3148; }
  #chat-input { flex: 1; background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px; color: #e2e8f0; padding: 10px 14px; font-size: 14px; outline: none; resize: none; font-family: inherit; line-height: 1.5; max-height: 120px; transition: border-color .15s; }
  #chat-input:focus { border-color: #6366f1; }
  #chat-send { align-self: flex-end; padding: 10px 20px; }
  .thinking { color: #7c83a0; font-style: italic; font-size: 13px; }
  .tool-status { font-size: 12px; color: #7c83a0; font-style: italic; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .tool-status::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 50%; border: 2px solid #6366f1; border-top-color: transparent; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .chat-empty { color: #5a6080; font-size: 14px; text-align: center; margin: auto; padding: 40px; }

  /* Markdown content inside assistant bubbles */
  .md-content { line-height: 1.65; }
  .md-content p { margin: 0 0 10px; }
  .md-content p:last-child { margin-bottom: 0; }
  .md-content strong { font-weight: 700; }
  .md-content em { font-style: italic; }
  .md-content h1,.md-content h2,.md-content h3 { font-weight: 700; margin: 14px 0 6px; font-size: 15px; }
  .md-content ul,.md-content ol { margin: 4px 0 10px 18px; padding: 0; }
  .md-content li { margin-bottom: 3px; }
  .md-content code { background: rgba(0,0,0,.35); border-radius: 3px; padding: 1px 5px; font-family: "SF Mono","Fira Code",monospace; font-size: 12px; }
  .md-content pre { background: rgba(0,0,0,.35); border-radius: 6px; padding: 10px 12px; margin: 8px 0; overflow-x: auto; }
  .md-content pre code { background: none; padding: 0; font-size: 12px; }
  .md-content blockquote { border-left: 3px solid #4a4f70; margin: 8px 0; padding: 4px 12px; color: #9ca3b8; }

  /* Think block */
  .think-block { margin-bottom: 10px; border: 1px solid #2d3148; border-radius: 6px; overflow: hidden; }
  .think-block summary { cursor: pointer; padding: 6px 10px; font-size: 12px; color: #7c83a0; user-select: none; list-style: none; display: flex; align-items: center; gap: 6px; background: #13151f; }
  .think-block summary::before { content: "▶"; font-size: 9px; transition: transform .2s; }
  .think-block[open] summary::before { transform: rotate(90deg); }
  .think-block summary::-webkit-details-marker { display: none; }
  .think-content { padding: 10px 12px; font-size: 12px; color: #7c83a0; white-space: pre-wrap; word-break: break-word; font-family: "SF Mono","Fira Code",monospace; line-height: 1.55; background: #0d0f18; }

  /* Override badge */
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  .badge-override { background: rgba(99,102,241,.25); color: #a5b4fc; }
  .badge-default { background: rgba(90,96,128,.2); color: #7c83a0; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #22253a; border: 1px solid #2d3148; border-radius: 8px; padding: 12px 18px; font-size: 14px; opacity: 0; transform: translateY(8px); transition: opacity .25s, transform .25s; pointer-events: none; z-index: 100; max-width: 320px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: #dc2626; color: #fca5a5; }
  #toast.success { border-color: #059669; color: #6ee7b7; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Jobs</h1>
  <div id="job-list"></div>
  <div id="chat-link" class="nav-link" onclick="openChat()">Chat with Advisor</div>
  <div id="runs-link" class="nav-link" onclick="openRuns()">Job Runs</div>
</div>

<div id="main">
  <!-- Job view -->
  <div id="job-view" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div id="header">
      <h2 id="job-title">Select a job</h2>
      <div class="next" id="job-next"></div>
      <div class="tabs" id="tabs" style="display:none">
        <div class="tab active" data-tab="schedule">Schedule</div>
        <div class="tab" data-tab="prompt" id="prompt-tab">Prompt</div>
      </div>
    </div>
    <div id="content">
      <div class="panel active" id="panel-schedule">
        <p style="color:#5a6080;font-size:14px">Select a job from the sidebar.</p>
      </div>
      <div class="panel" id="panel-prompt"></div>
    </div>
  </div>

  <!-- Job Runs view -->
  <div id="runs-view">
    <div id="runs-header">
      <h2>Job Runs</h2>
      <button class="btn-secondary" onclick="loadRuns()" style="padding:6px 14px;font-size:13px">Refresh</button>
    </div>
    <div id="runs-body">
      <p class="runs-empty">Loading…</p>
    </div>
  </div>

  <!-- Chat view -->
  <div id="chat-view">
    <!-- Session list -->
    <div id="session-panel">
      <div id="session-panel-header">
        <span>History</span>
        <button id="new-chat-btn" title="New chat" onclick="newChat()">+</button>
      </div>
      <div id="session-list"></div>
    </div>
    <!-- Conversation -->
    <div id="convo-panel">
      <div id="chat-header">
        <h2>Financial Advisor</h2>
        <p>Ask anything about your spending, budgets, savings, or transactions.</p>
      </div>
      <div id="chat-messages">
        <p class="chat-empty">Select a conversation or start a new one.</p>
      </div>
      <div id="chat-input-row">
        <textarea id="chat-input" rows="1" placeholder="Ask about your finances…"></textarea>
        <button class="btn-primary" id="chat-send" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const JOBS_WITH_PROMPTS = new Set(["daily_digest","anomaly_check","weekly_report","monthly_review","investment_tracker"]);
let currentJob = null;

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.status === 204 ? null : r.json();
}

function toast(msg, type = "success") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ""; }, 3200);
}

function fmtNext(iso) {
  if (!iso) return "Not scheduled";
  const d = new Date(iso);
  return "Next run: " + d.toLocaleString();
}

async function loadJobs() {
  const jobs = await api("GET", "/api/jobs");
  const list = document.getElementById("job-list");
  list.innerHTML = "";
  for (const j of jobs) {
    const el = document.createElement("div");
    el.className = "job-item";
    el.dataset.id = j.id;
    el.innerHTML = `<div>${j.name}</div><div class="job-next">${fmtNext(j.next_run_time)}</div>`;
    el.onclick = () => selectJob(j.id);
    list.appendChild(el);
  }
}

async function selectJob(jobId) {
  _deactivateAll();
  currentJob = jobId;
  document.getElementById("job-view").style.display = "flex";

  document.querySelectorAll(".job-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === jobId);
  });

  const jobs = await api("GET", "/api/jobs");
  const job = jobs.find(j => j.id === jobId);
  document.getElementById("job-title").textContent = job.name;
  document.getElementById("job-next").textContent = fmtNext(job.next_run_time);

  const tabs = document.getElementById("tabs");
  const promptTab = document.getElementById("prompt-tab");
  tabs.style.display = "flex";
  if (JOBS_WITH_PROMPTS.has(jobId)) {
    promptTab.style.display = "";
  } else {
    promptTab.style.display = "none";
    // ensure schedule tab is active
    activateTab("schedule");
  }

  await renderSchedulePanel(jobId);
  if (JOBS_WITH_PROMPTS.has(jobId)) await renderPromptPanel(jobId);
}

async function renderSchedulePanel(jobId) {
  const { cron, is_override } = await api("GET", `/api/jobs/${jobId}/schedule`);
  const badgeHtml = is_override
    ? '<span class="badge badge-override">custom</span>'
    : '<span class="badge badge-default">default</span>';

  document.getElementById("panel-schedule").innerHTML = `
    <h3 style="margin-bottom:16px;font-size:16px">Cron Schedule ${badgeHtml}</h3>
    <div class="form-row">
      ${["minute","hour","day","month","day_of_week"].map(f => `
        <div class="field">
          <label>${f.replace("_"," ")}</label>
          <input id="cron-${f}" value="${cron[f] ?? "*"}">
        </div>`).join("")}
    </div>
    <p class="hint">Standard cron syntax. Use * for any, */n for every n, comma-separated values, or ranges (e.g. 1-5).</p>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveSchedule()">Save Schedule</button>
      <button class="btn-run" onclick="triggerJob()">Run Now</button>
    </div>
  `;
}

async function renderPromptPanel(jobId) {
  const { system_prompt, is_override } = await api("GET", `/api/jobs/${jobId}/prompt`);
  const badgeHtml = is_override
    ? '<span class="badge badge-override">custom</span>'
    : '<span class="badge badge-default">default</span>';

  document.getElementById("panel-prompt").innerHTML = `
    <h3 style="margin-bottom:12px;font-size:16px">System Prompt ${badgeHtml}</h3>
    <p class="prompt-hint">⚠️ Runtime placeholders like <code>{date}</code> and <code>{month}</code> are filled in automatically — keep them in your prompt.</p>
    <textarea id="prompt-text">${escHtml(system_prompt)}</textarea>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn-primary" onclick="savePrompt()">Save Prompt</button>
      <button class="btn-danger" onclick="resetPrompt()">Reset to Default</button>
    </div>
  `;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Tab switching
document.getElementById("tabs").addEventListener("click", e => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  activateTab(tab.dataset.tab);
});

function activateTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === `panel-${name}`));
}

async function saveSchedule() {
  if (!currentJob) return;
  const fields = {};
  for (const f of ["minute","hour","day","month","day_of_week"]) {
    fields[f] = document.getElementById(`cron-${f}`).value.trim();
  }
  try {
    const res = await api("PUT", `/api/jobs/${currentJob}/schedule`, fields);
    toast(`Schedule saved. Next run: ${res.next_run_time ? new Date(res.next_run_time).toLocaleString() : "unknown"}`);
    await loadJobs();
    // refresh next run display
    document.getElementById("job-next").textContent = fmtNext(res.next_run_time);
    await renderSchedulePanel(currentJob);
  } catch(e) { toast(e.message, "error"); }
}

async function triggerJob() {
  if (!currentJob) return;
  try {
    await api("POST", `/api/jobs/${currentJob}/trigger`);
    toast("Job triggered — check Telegram for output.");
  } catch(e) { toast(e.message, "error"); }
}

async function savePrompt() {
  if (!currentJob) return;
  const text = document.getElementById("prompt-text").value;
  try {
    await api("PUT", `/api/jobs/${currentJob}/prompt`, { system_prompt: text });
    toast("Prompt saved.");
    await renderPromptPanel(currentJob);
  } catch(e) { toast(e.message, "error"); }
}

async function resetPrompt() {
  if (!currentJob) return;
  if (!confirm("Reset to default prompt?")) return;
  try {
    const res = await api("DELETE", `/api/jobs/${currentJob}/prompt`);
    toast("Prompt reset to default.");
    await renderPromptPanel(currentJob);
  } catch(e) { toast(e.message, "error"); }
}

// ── Running job tracking ─────────────────────────────────────────────────────

let _runningJobs = {};

function elapsed(isoStart) {
  const secs = Math.floor((Date.now() - new Date(isoStart)) / 1000);
  if (secs < 60) return `${secs}s`;
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${m}m ${s}s`;
}

function connectRunningStream() {
  const es = new EventSource("/api/jobs/running/stream");
  es.onmessage = e => {
    _runningJobs = JSON.parse(e.data);
    updateRunningIndicators();
  };
  es.onerror = () => {
    es.close();
    // Reconnect after 5 s if the stream drops
    setTimeout(connectRunningStream, 5000);
  };
}

function updateRunningIndicators() {
  // Sidebar dots
  document.querySelectorAll(".job-item").forEach(el => {
    const jobId = el.dataset.id;
    const startedAt = _runningJobs[jobId];
    let dot = el.querySelector(".run-dot");
    let elapsedEl = el.querySelector(".run-elapsed");

    if (startedAt) {
      if (!dot) {
        dot = document.createElement("span");
        dot.className = "run-dot";
        el.querySelector("div").appendChild(dot);
      }
      if (!elapsedEl) {
        elapsedEl = document.createElement("div");
        elapsedEl.className = "run-elapsed";
        el.appendChild(elapsedEl);
      }
      elapsedEl.textContent = "Running " + elapsed(startedAt);
    } else {
      dot?.remove();
      elapsedEl?.remove();
    }
  });

  // Header badge for selected job
  const badge = document.getElementById("running-badge");
  const startedAt = currentJob ? _runningJobs[currentJob] : null;
  if (startedAt) {
    if (badge) {
      badge.textContent = "Running " + elapsed(startedAt);
    } else {
      const h2 = document.getElementById("job-title");
      const b = document.createElement("span");
      b.id = "running-badge";
      b.className = "badge-running";
      b.textContent = "Running " + elapsed(startedAt);
      h2.insertAdjacentElement("afterend", b);
    }
  } else {
    badge?.remove();
  }
}

// Init
loadJobs();
setInterval(loadJobs, 600000);
connectRunningStream();
// Refresh elapsed text every second without re-fetching
setInterval(updateRunningIndicators, 1000);

// ── View switching helpers ───────────────────────────────────────────────────

function _deactivateAll() {
  document.querySelectorAll(".job-item").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
  document.getElementById("job-view").style.display = "none";
  document.getElementById("chat-view").classList.remove("active");
  document.getElementById("runs-view").classList.remove("active");
  currentJob = null;
}

// ── Chat ────────────────────────────────────────────────────────────────────

let currentSessionId = null;

function openChat() {
  _deactivateAll();
  document.getElementById("chat-link").classList.add("active");
  document.getElementById("chat-view").classList.add("active");
  loadSessions();
  document.getElementById("chat-input").focus();
}

function newChat() {
  currentSessionId = null;
  document.querySelectorAll(".session-item").forEach(el => el.classList.remove("active"));
  document.getElementById("chat-messages").innerHTML = '<p class="chat-empty">Start typing to begin a new conversation.</p>';
}

async function loadSessions() {
  const list = document.getElementById("session-list");
  try {
    const sessions = await api("GET", "/api/chat/sessions");
    if (!sessions.length) {
      list.innerHTML = '<p style="font-size:12px;color:#5a6080;padding:12px">No conversations yet.</p>';
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div class="session-item${s.id === currentSessionId ? " active" : ""}" data-id="${s.id}" onclick="loadSession(${s.id})">
        <div style="flex:1;min-width:0">
          <div class="session-title">${escHtml(s.title)}</div>
          <div class="session-date">${new Date(s.created_at).toLocaleDateString()}</div>
        </div>
        <span class="session-del" title="Delete" onclick="deleteSession(event,${s.id})">✕</span>
      </div>`).join("");
  } catch(e) {
    list.innerHTML = `<p style="font-size:12px;color:#f87171;padding:12px">${e.message}</p>`;
  }
}

async function loadSession(sessionId) {
  currentSessionId = sessionId;
  document.querySelectorAll(".session-item").forEach(el =>
    el.classList.toggle("active", Number(el.dataset.id) === sessionId));

  const container = document.getElementById("chat-messages");
  container.innerHTML = "";
  try {
    const messages = await api("GET", `/api/chat/sessions/${sessionId}`);
    if (!messages.length) {
      container.innerHTML = '<p class="chat-empty">No messages in this conversation.</p>';
      return;
    }
    messages.forEach(m => appendMessage(m.role, m.content));
  } catch(e) {
    container.innerHTML = `<p class="chat-empty">Failed to load: ${e.message}</p>`;
  }
}

async function deleteSession(event, sessionId) {
  event.stopPropagation();
  if (!confirm("Delete this conversation?")) return;
  try {
    await api("DELETE", `/api/chat/sessions/${sessionId}`);
    if (currentSessionId === sessionId) {
      currentSessionId = null;
      document.getElementById("chat-messages").innerHTML = '<p class="chat-empty">Select a conversation or start a new one.</p>';
    }
    await loadSessions();
  } catch(e) { toast(e.message, "error"); }
}

// ── Job Runs ─────────────────────────────────────────────────────────────────

function openRuns() {
  _deactivateAll();
  document.getElementById("runs-link").classList.add("active");
  document.getElementById("runs-view").classList.add("active");
  loadRuns();
}

function fmtDuration(secs) {
  if (secs == null) return "—";
  if (secs < 60) return secs.toFixed(1) + "s";
  const m = Math.floor(secs / 60), s = Math.round(secs % 60);
  return `${m}m ${s}s`;
}

function fmtDatetime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString();
}

function toggleTrace(id) {
  const row = document.getElementById(id);
  const toggle = row.previousElementSibling.querySelector(".trace-toggle");
  const hidden = row.style.display === "none";
  row.style.display = hidden ? "" : "none";
  toggle.textContent = hidden ? "▼ trace" : "▶ trace";
}

async function loadRuns() {
  const body = document.getElementById("runs-body");
  try {
    const runs = await api("GET", "/api/job-runs?limit=100");
    if (!runs.length) {
      body.innerHTML = '<p class="runs-empty">No job runs recorded yet.</p>';
      return;
    }
    const rows = runs.map((r, i) => {
      const hasTrace = !!r.trace;
      const traceId = `trace-${r.id}`;
      const mainRow = `
        <tr>
          <td style="color:#5a6080">${r.id}</td>
          <td>${r.job_name}</td>
          <td style="white-space:nowrap">${fmtDatetime(r.started_at)}</td>
          <td style="white-space:nowrap">${fmtDuration(r.duration_seconds)}</td>
          <td class="status-${r.status}">${r.status}</td>
          <td class="error-cell">
            ${r.error ? escHtml(r.error) : ''}
            ${hasTrace ? `<span class="trace-toggle" onclick="toggleTrace('${traceId}')">▶ trace</span>` : ''}
          </td>
        </tr>`;
      const traceRow = hasTrace ? `
        <tr class="trace-row" id="${traceId}" style="display:none">
          <td colspan="6"><pre class="trace-pre">${escHtml(r.trace)}</pre></td>
        </tr>` : '';
      return mainRow + traceRow;
    }).join("");

    body.innerHTML = `
      <table class="runs-table">
        <thead>
          <tr>
            <th>#</th><th>Job</th><th>Started</th><th>Duration</th><th>Status</th><th>Error</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) {
    body.innerHTML = `<p class="runs-empty">Failed to load runs: ${e.message}</p>`;
  }
}

function renderAssistantContent(text) {
  const frag = document.createDocumentFragment();
  const thinkRe = /<think>([\s\S]*?)<\/think>/g;
  let last = 0, match;

  while ((match = thinkRe.exec(text)) !== null) {
    const before = text.slice(last, match.index).trim();
    if (before) {
      const d = document.createElement("div");
      d.className = "md-content";
      d.innerHTML = marked.parse(before);
      frag.appendChild(d);
    }
    const details = document.createElement("details");
    details.className = "think-block";
    const summary = document.createElement("summary");
    summary.textContent = "Thinking";
    const pre = document.createElement("div");
    pre.className = "think-content";
    pre.textContent = match[1].trim();
    details.appendChild(summary);
    details.appendChild(pre);
    frag.appendChild(details);
    last = thinkRe.lastIndex;
  }

  const rest = text.slice(last).trim();
  if (rest) {
    const d = document.createElement("div");
    d.className = "md-content";
    d.innerHTML = marked.parse(rest);
    frag.appendChild(d);
  }

  return frag;
}

function appendMessage(role, text) {
  const container = document.getElementById("chat-messages");
  const empty = container.querySelector(".chat-empty");
  if (empty) empty.remove();
  const wrap = document.createElement("div");
  wrap.className = `chat-msg ${role}`;
  const label = document.createElement("div");
  label.className = "chat-label";
  label.textContent = role === "user" ? "You" : "Advisor";
  const bubble = document.createElement("div");
  bubble.className = "chat-bubble";
  if (role === "assistant" && text !== "Thinking…") {
    bubble.appendChild(renderAssistantContent(text));
  } else {
    bubble.textContent = text;
  }
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";
  input.style.height = "auto";
  document.getElementById("chat-send").disabled = true;

  appendMessage("user", msg);

  // Build the assistant message wrapper manually so we can update it in place
  const container = document.getElementById("chat-messages");
  container.querySelector(".chat-empty")?.remove();
  const wrap = document.createElement("div");
  wrap.className = "chat-msg assistant";
  const label = document.createElement("div");
  label.className = "chat-label";
  label.textContent = "Advisor";
  const statusEl = document.createElement("div");
  statusEl.className = "tool-status";
  statusEl.textContent = "Thinking…";
  const bubble = document.createElement("div");
  bubble.className = "chat-bubble";
  wrap.appendChild(label);
  wrap.appendChild(statusEl);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;

  let fullReply = "";
  let initialized = false;

  function setStatus(text) {
    statusEl.textContent = text;
    statusEl.style.display = "flex";
  }
  function clearStatus() {
    statusEl.style.display = "none";
  }

  function makeThinkBlock(content, open) {
    const details = document.createElement("details");
    details.className = "think-block";
    details.open = open;
    const summary = document.createElement("summary");
    summary.textContent = "Thinking";
    const div = document.createElement("div");
    div.className = "think-content";
    div.textContent = content;
    details.appendChild(summary);
    details.appendChild(div);
    return details;
  }

  function updateStreamingBubble() {
    if (!initialized) { clearStatus(); initialized = true; }
    bubble.innerHTML = "";

    const thinkRe = /<think>([\s\S]*?)<\/think>/g;
    let last = 0, match;

    // Render each complete <think> block as a collapsed collapsible
    while ((match = thinkRe.exec(fullReply)) !== null) {
      const before = fullReply.slice(last, match.index).trim();
      if (before) { const d = document.createElement("div"); d.textContent = before; bubble.appendChild(d); }
      bubble.appendChild(makeThinkBlock(match[1].trim(), false));
      last = thinkRe.lastIndex;
    }

    const rest = fullReply.slice(last);
    const openIdx = rest.indexOf("<think>");

    if (openIdx !== -1) {
      // An in-progress <think> block — show it open and streaming
      const before = rest.slice(0, openIdx).trim();
      if (before) { const d = document.createElement("div"); d.textContent = before; bubble.appendChild(d); }
      bubble.appendChild(makeThinkBlock(rest.slice(openIdx + 7), true));
    } else if (rest.trim()) {
      const d = document.createElement("div");
      d.textContent = rest.trim();
      bubble.appendChild(d);
    }

    container.scrollTop = container.scrollHeight;
  }

  try {
    const response = await fetch("/api/chat/stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, session_id: currentSessionId }),
    });
    if (!response.ok) {
      const err = await response.json().catch(() => ({ detail: response.statusText }));
      throw new Error(err.detail || response.statusText);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split("\n");
      sseBuffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }

        if (event.type === "session") {
          if (currentSessionId !== event.session_id) {
            currentSessionId = event.session_id;
            loadSessions();
          }
        } else if (event.type === "tool") {
          setStatus(`Calling ${event.name.replace(/_/g, " ")}…`);
        } else if (event.type === "token") {
          fullReply += event.text;
          updateStreamingBubble();
        } else if (event.type === "reset") {
          fullReply = "";
          initialized = false;
          bubble.innerHTML = "";
          setStatus("Thinking…");
        } else if (event.type === "done") {
          // Replace streaming DOM with fully-rendered markdown + collapsible think
          bubble.innerHTML = "";
          bubble.appendChild(renderAssistantContent(event.reply || fullReply));
          container.scrollTop = container.scrollHeight;
        } else if (event.type === "error") {
          clearStatus();
          bubble.textContent = "Error: " + event.text;
        }
      }
    }
  } catch(e) {
    clearStatus();
    bubble.textContent = "Error: " + e.message;
  } finally {
    document.getElementById("chat-send").disabled = false;
    input.focus();
  }
}

// Auto-resize textarea and submit on Enter (Shift+Enter for newline)
document.getElementById("chat-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});
document.getElementById("chat-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
</script>
